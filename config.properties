# ============================================
# E-Commerce Application Configuration
# ============================================

# Database Configuration
db.driver=com.mysql.cj.jdbc.Driver
db.url=jdbc:mysql://localhost:3306/ecommerce?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
db.user=root
db.password=root
db.pool.size=10
db.pool.max.lifetime=1800000

# Application Settings
app.name=E-Commerce Desktop Application
app.version=1.0.0
app.theme=dark
app.language=en
app.window.width=1400
app.window.height=900
app.window.resizable=true

# UI Settings
ui.animation.enabled=true
ui.animation.duration=300
ui.font.family=Segoe UI
ui.font.size=12
ui.icon.size=24

# Image Settings
image.max.size=10485760
image.cache.enabled=true
image.cache.size=104857600
image.quality=0.95
image.thumbnail.width=200
image.thumbnail.height=200

# Security Settings
security.password.min.length=8
security.password.require.uppercase=true
security.password.require.numbers=true
security.password.require.special=true
security.session.timeout=1800
security.bcrypt.strength=12

# File Paths
file.uploads.path=./uploads
file.products.path=./uploads/products
file.users.path=./uploads/users
file.temp.path=./temp
file.reports.path=./reports
file.backup.path=./backups

# API Configuration
api.payment.enabled=false
api.payment.gateway=stripe
api.email.enabled=false
api.email.provider=smtp
api.sms.enabled=false
api.analytics.enabled=true

# Email Configuration (Optional)
email.smtp.host=smtp.gmail.com
email.smtp.port=587
email.smtp.auth=true
email.smtp.starttls=true
email.from=noreply@ecommerce.com

# Virtual Try-On Settings
virtualtryon.enabled=true
virtualtryon.opencv.enabled=true
virtualtryon.camera.enabled=true
virtualtryon.quality=HIGH

# Analytics Settings
analytics.enabled=true
analytics.update.interval=300000
analytics.export.format=csv,pdf

# Logging
logging.level=INFO
logging.file=./logs/app.log
logging.max.size=104857600

# Development Settings
dev.mode=false
dev.mock.data=false
dev.api.mock=false